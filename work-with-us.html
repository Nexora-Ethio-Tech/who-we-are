<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d1718" />
    <meta
      name="description"
      content="Send a project inquiry to Nexora Technology PLC."
    />
    <meta property="og:title" content="Work With Us | Nexora Technology PLC" />
    <meta
      property="og:description"
      content="Send your project brief and partner with Nexora Technology PLC."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nexoratechnology.com/work-with-us" />
    <title>Work With Us | Nexora Technology PLC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles/main.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-one"></div>
    <div class="bg-orb bg-orb-two"></div>
    <div class="noise-layer"></div>

    <div class="site-shell inquiry-shell">
      <header class="topbar">
        <div class="brand-wrap">
          <span class="brand-pulse" aria-hidden="true"></span>
          <div>
            <p class="brand-name">Nexora Technology PLC</p>
            <p class="brand-badge">Partnership Inquiry</p>
          </div>
        </div>
        <nav class="nav-links">
          <a href="./index.html">Home</a>
          <a href="./index.html#capabilities">Capabilities</a>
          <a href="./index.html#contact">Contact</a>
        </nav>
        <a class="cta-btn" href="./index.html">Back to Site</a>
      </header>

      <main class="section-block">
        <section class="contact-panel inquiry-panel">
          <p class="eyebrow">Work With Us</p>
          <h2>Send Your Project Brief</h2>
          <p>
            Fill this form to send your inquiry directly to our inbox. If a direct
            endpoint is not configured yet, we will fall back to your email app.
          </p>

          <form id="inquiry-form" class="inquiry-form">
            <input type="text" name="company_website" tabindex="-1" autocomplete="off" class="hp-field" aria-hidden="true" />
            <input type="hidden" name="loaded_at" id="loaded-at" />

            <label>
              Full Name
              <input type="text" name="name" required />
            </label>

            <label>
              Email Address
              <input type="email" name="email" required />
            </label>

            <label>
              Organization
              <input type="text" name="organization" />
            </label>

            <label>
              Project Subject
              <input type="text" name="subject" required />
            </label>

            <label>
              Message
              <textarea name="message" rows="7" required></textarea>
            </label>

            <button class="btn-primary" type="submit">Send Inquiry</button>
          </form>

          <p id="inquiry-status" class="contact-note" aria-live="polite"></p>
        </section>
      </main>
    </div>

    <script type="module" src="./src/work-with-us.js"></script>
  </body>
</html>
